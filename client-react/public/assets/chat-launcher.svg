<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="60" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#3b82f6" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Outer circle -->
  <circle cx="30" cy="30" r="30" fill="url(#bg)" filter="url(#soft-shadow)"/>

  <!-- Glossy highlight -->
  <ellipse cx="30" cy="18" rx="18" ry="11" fill="url(#shine)"/>

  <!-- Chat bubble body -->
  <path
    d="M13 20a4 4 0 0 1 4-4h26a4 4 0 0 1 4 4v14a4 4 0 0 1-4 4H32l-7 6v-6h-8a4 4 0 0 1-4-4V20z"
    fill="#ffffff"
    fill-opacity="0.97"
  />

  <!-- Message lines inside bubble -->
  <rect x="20" y="25" width="20" height="2.5" rx="1.25" fill="url(#bg)" opacity="0.75"/>
  <rect x="20" y="30.5" width="13" height="2.5" rx="1.25" fill="url(#bg)" opacity="0.55"/>

  <!-- Subtle dot trio for "typing" feel -->
  <circle cx="22" cy="37.5" r="1.2" fill="#6366f1" opacity="0.4"/>
  <circle cx="25.5" cy="37.5" r="1.2" fill="#6366f1" opacity="0.3"/>
  <circle cx="29" cy="37.5" r="1.2" fill="#6366f1" opacity="0.2"/>
</svg>
